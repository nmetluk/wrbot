name: CI

# Линт/типизация/тесты кода бота + миграции + валидация.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies from uv.lock (deterministic, exact versions)
        run: uv sync --frozen --extra dev

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Ruff linter
        run: uv run ruff check src tests

      - name: MyPy type check
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

      - name: Alembic migrations
        run: BOT_TOKEN=test uv run alembic upgrade head

      - name: Validate handoff/state
        run: uv run python scripts/validate.py

      - name: Lint automation scripts
        run: |
          uv run ruff check scripts
          uv run python -m py_compile scripts/*.py
