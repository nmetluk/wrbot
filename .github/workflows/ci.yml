name: ci

# Линт/типизация/тесты кода бота. До появления src/wrbot шаги мягко пропускаются.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect project
        id: detect
        shell: bash
        run: |
          if [ -f pyproject.toml ]; then echo "has_project=true" >> "$GITHUB_OUTPUT";
          else echo "has_project=false" >> "$GITHUB_OUTPUT"; fi
          if [ -d src ] && find src -name '*.py' | grep -q .; then echo "has_src=true" >> "$GITHUB_OUTPUT";
          else echo "has_src=false" >> "$GITHUB_OUTPUT"; fi

      - name: Install dependencies
        if: steps.detect.outputs.has_project == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install ruff mypy pytest

      - name: Install linters (no project yet)
        if: steps.detect.outputs.has_project == 'false'
        run: pip install ruff

      - name: Ruff (lint)
        if: steps.detect.outputs.has_src == 'true'
        run: ruff check src tests || true

      - name: Ruff format check
        if: steps.detect.outputs.has_src == 'true'
        run: ruff format --check src tests || true

      - name: Mypy
        if: steps.detect.outputs.has_project == 'true' && steps.detect.outputs.has_src == 'true'
        run: mypy src || true

      - name: Pytest
        if: steps.detect.outputs.has_src == 'true'
        run: pytest -q || true

      - name: Lint automation scripts
        run: |
          pip install ruff
          ruff check scripts || true
          python -m py_compile scripts/*.py

      - name: Note
        if: steps.detect.outputs.has_src == 'false'
        run: echo "src/ ещё пуст — code-проверки появятся после TASK-0001."
